on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube Video URL'
        required: true
        type: string
      model_size:
        description: 'Whisper Model Size (tiny, small, medium, large)'
        required: false
        default: 'small'
        type: string
      language:
        description: 'Language Code (e.g., en, fr, es)'
        required: false
        default: 'en'
        type: string

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install whisper yt-dlp torch

      - name: Run transcription
        run: python transcribe.py "${{ inputs.youtube_url }}" "${{ inputs.model_size }}" "${{ inputs.language }}"

      - name: Upload transcription file
        uses: actions/upload-artifact@v3
        with:
          name: transcription
          path: transcription.txt